<div class="page-container">
  <h2>Registra iniezione</h2>

  @if (existingInjection()) {
    <div class="already-done">
      <mat-icon>check_circle</mat-icon>
      <span>Iniezione già registrata oggi ({{ existingInjection()!.doseMg }} mg)</span>
    </div>
  }

  <mat-card class="info-card">
    <mat-card-content>
      <p>Settimana <strong>{{ currentWeek }}</strong> · {{ today }}</p>
      @if (injectionDayLabel) {
        <p>Giorno previsto: <strong>{{ injectionDayLabel }}</strong></p>
      }
    </mat-card-content>
  </mat-card>

  <form [formGroup]="form" (ngSubmit)="save()" class="injection-form">
    <mat-form-field class="full-width">
      <mat-label>Dose (mg)</mat-label>
      <input matInput type="number" formControlName="doseMg" step="0.5" min="0.5" />
      <span matSuffix>mg</span>
    </mat-form-field>

    <mat-form-field class="full-width">
      <mat-label>Note (opzionale)</mat-label>
      <textarea matInput formControlName="notes" rows="2"></textarea>
    </mat-form-field>

    <button mat-raised-button color="primary" type="submit"
            [disabled]="form.invalid || saving()">
      {{ saving() ? 'Salvataggio...' : 'Registra iniezione' }}
    </button>
  </form>
</div>
