<div class="page-container">
  <h2>Log di oggi</h2>
  <p class="date-label">{{ today }}</p>

  <form [formGroup]="form" (ngSubmit)="save()" class="log-form">

    <!-- Glucose -->
    <mat-card>
      <mat-card-header>
        <mat-icon mat-card-avatar>bloodtype</mat-icon>
        <mat-card-title>Glicemia (mg/dL)</mat-card-title>
      </mat-card-header>
      <mat-card-content class="card-fields">
        <mat-form-field>
          <mat-label>Mattina (a digiuno)</mat-label>
          <input matInput type="number" formControlName="glucoseMorning" min="50" max="500" />
          <span matSuffix>mg/dL</span>
        </mat-form-field>
        <mat-form-field>
          <mat-label>Sera</mat-label>
          <input matInput type="number" formControlName="glucoseEvening" min="50" max="500" />
          <span matSuffix>mg/dL</span>
        </mat-form-field>
      </mat-card-content>
    </mat-card>

    <!-- Water -->
    <mat-card>
      <mat-card-header>
        <mat-icon mat-card-avatar>water_drop</mat-icon>
        <mat-card-title>Acqua</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <mat-form-field class="full-width">
          <mat-label>Litri bevuti oggi</mat-label>
          <input matInput type="number" formControlName="waterLiters" step="0.1" min="0" max="6" />
          <span matSuffix>L</span>
        </mat-form-field>
      </mat-card-content>
    </mat-card>

    <!-- Sleep -->
    <mat-card>
      <mat-card-header>
        <mat-icon mat-card-avatar>bedtime</mat-icon>
        <mat-card-title>Sonno</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <mat-form-field class="full-width">
          <mat-label>Ore di sonno</mat-label>
          <input matInput type="number" formControlName="sleepHours" step="0.5" min="0" max="24" />
          <span matSuffix>h</span>
        </mat-form-field>
      </mat-card-content>
    </mat-card>

    <!-- Optional extras -->
    <mat-card>
      <mat-card-header>
        <mat-icon mat-card-avatar>more_horiz</mat-icon>
        <mat-card-title>Altro (opzionale)</mat-card-title>
      </mat-card-header>
      <mat-card-content class="card-fields">
        <mat-form-field>
          <mat-label>Livello di stress</mat-label>
          <mat-select formControlName="stressLevel">
            <mat-option [value]="null">—</mat-option>
            <mat-option value="basso">Basso</mat-option>
            <mat-option value="medio">Medio</mat-option>
            <mat-option value="alto">Alto</mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field>
          <mat-label>Livello attività</mat-label>
          <mat-select formControlName="activityLevel">
            <mat-option [value]="null">—</mat-option>
            <mat-option value="basso">Basso</mat-option>
            <mat-option value="medio">Medio</mat-option>
            <mat-option value="alto">Alto</mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field class="full-width">
          <mat-label>Note</mat-label>
          <textarea matInput formControlName="notes" rows="2"></textarea>
        </mat-form-field>
      </mat-card-content>
    </mat-card>

    <button mat-raised-button color="primary" type="submit" [disabled]="saving()">
      {{ saving() ? 'Salvataggio...' : 'Salva log' }}
    </button>
  </form>
</div>
